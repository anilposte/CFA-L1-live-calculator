// ══════════════════════════════════════════════════════════
  // 13. CONVEXITY ADJUSTMENT
  // ══════════════════════════════════════════════════════════
  {
    id: 'convexity',
    subject: 'Fixed Income',
    name: 'Convexity Adjustment',
    tagline: 'Why duration alone underestimates price gains and overestimates losses',
    bigIdea: `Modified Duration gives you a linear approximation of how bond prices change with yields. But the true price-yield relationship is a <strong>curve, not a straight line</strong>. That curvature is convexity. When yields move significantly, duration alone gives you the wrong answer — convexity corrects it. And the correction is always in your favour for standard bonds.`,
    formula: `ΔP ≈ −<span class="hi">ModDur</span> × ΔYield × P + ½ × <span class="hi2">Convexity</span> × (<span class="hi3">ΔYield</span>)² × P`,
    vars: [
      { sym: '−ModDur × ΔYield × P', def: 'The duration effect — linear approximation of price change' },
      { sym: '½ × Convexity × (ΔYield)²', def: 'The convexity adjustment — always positive for option-free bonds' },
      { sym: 'Convexity', def: 'A measure of the curvature in the price-yield relationship (always positive for standard bonds)' },
    ],
    intuition: `Imagine driving along a curved road. Duration is like measuring your position using only your speed and direction — it works fine for short distances, but on a curve, you'll drift off the road if you don't account for the bend. Convexity is the bend. For option-free bonds, the curve always bends <strong>in the investor's favour</strong>: prices rise more than duration predicts when yields fall, and fall less than duration predicts when yields rise. This asymmetry is why convexity is a desirable property.`,
    pullQuote: `"All else equal, a bond with higher convexity is always preferable. It outperforms a lower-convexity bond in both rising and falling yield environments."`,
    connected: ['mod-duration', 'bond-price'],
    inputs: [
      { id: 'cv_moddur', label: 'Modified Duration', sym: 'ModDur', type: 'range', min: 0.5, max: 20, step: 0.5, val: 7, unit: '' },
      { id: 'cv_conv', label: 'Convexity', sym: 'Conv', type: 'range', min: 0, max: 200, step: 5, val: 60, unit: '' },
      { id: 'cv_dy', label: 'Yield Change', sym: 'ΔYield', type: 'range', min: -300, max: 300, step: 10, val: 100, unit: 'bps' },
      { id: 'cv_price', label: 'Bond Price ($)', sym: 'P', type: 'number', min: 100, max: 2000, step: 10, val: 1000, unit: '$' },
    ],
    calc(v) {
      const dy = v.cv_dy / 10000;
      const dur_eff = -v.cv_moddur * dy * v.cv_price;
      const conv_adj = 0.5 * v.cv_conv * dy * dy * v.cv_price;
      const total = dur_eff + conv_adj;
      const dur_only = dur_eff;
      const new_price = v.cv_price + total;
      const breakdown = `Duration effect: <strong>$${dur_eff.toFixed(2)}</strong> + Convexity adj: <strong>$${conv_adj.toFixed(2)}</strong> = <strong>$${total.toFixed(2)}</strong>`;
      const direction = v.cv_dy > 0 ? 'rising' : 'falling';
      let insight = '';
      if (v.cv_dy === 0) {
        insight = `No yield change, no price change. The convexity value of ${v.cv_conv} tells you: the larger the yield move you expect, the more valuable this convexity becomes. It always adds to (or reduces the loss in) your total return.`;
      } else if (conv_adj < 0.01) {
        insight = `With a small yield move of ${Math.abs(v.cv_dy)} bps, the convexity adjustment is tiny ($${conv_adj.toFixed(2)}). Duration's linear approximation is very accurate for small yield changes — convexity matters most for large moves of 100+ basis points.`;
      } else if (v.cv_dy > 0) {
        insight = `Yields <em>rising</em> by ${v.cv_dy} bps. Duration alone would predict a price drop of $${Math.abs(dur_only).toFixed(2)}, but convexity <strong>cushions the fall by $${conv_adj.toFixed(2)}</strong>. The true price drop is only $${Math.abs(total).toFixed(2)}. This is convexity working in your favour — the curve bends to reduce losses when yields rise.`;
      } else {
        insight = `Yields <em>falling</em> by ${Math.abs(v.cv_dy)} bps. Duration alone would predict a price gain of $${Math.abs(dur_only).toFixed(2)}, but convexity <strong>adds an extra $${conv_adj.toFixed(2)}</strong>. The true price gain is $${Math.abs(total).toFixed(2)}. This is why falling yield environments reward high-convexity bonds more than duration alone would suggest.`;
      }
      return { value: `ΔP ≈ $${total.toFixed(2)}`, label: `New Price: $${new_price.toFixed(2)}`, breakdown, insight };
    },
    chart(v) {
      const labels = [], durOnly = [], withConv = [];
      for (let dy = -300; dy <= 300; dy += 25) {
        const dyD = dy / 10000;
        const d = -v.cv_moddur * dyD * v.cv_price;
        const c = 0.5 * v.cv_conv * dyD * dyD * v.cv_price;
        labels.push(dy + 'bps');
        durOnly.push((v.cv_price + d).toFixed(2));
        withConv.push((v.cv_price + d + c).toFixed(2));
      }
      return {
        labels,
        datasets: [
          { label: 'Duration + Convexity (true)', data: withConv, borderColor: '#2a7a4f', backgroundColor: 'rgba(42,122,79,0.06)', tension: 0.4, pointRadius: 1 },
          { label: 'Duration only (linear)', data: durOnly, borderColor: '#c8401a', borderDash: [5, 5], tension: 0.1, pointRadius: 0, borderWidth: 1.5 },
        ],
        xLabel: 'Yield Change (bps)', yLabel: 'Estimated Bond Price ($)',
        caption: 'The green curve (with convexity) always sits above the red line — higher price for any given yield move'
      };
    },
    traps: [
      { label: 'Negative convexity — callable bonds and MBS', text: 'Callable bonds and mortgage-backed securities have <strong>negative convexity</strong> near the call price. When yields fall, the issuer calls the bond back, capping your price upside. The convexity adjustment becomes negative — the bond underperforms a straight-line prediction when yields fall sharply.' },
      { label: 'Convexity is always positive for option-free bonds', text: 'For a plain vanilla bond with no embedded options, convexity is <strong>always positive</strong> — meaning the adjustment always helps the investor, regardless of the direction of yield change. This is stated as a fact on the exam.' },
    ],
    reality: `Portfolio managers deliberately seek high-convexity bonds when they expect large yield moves in either direction. The trade-off: high-convexity bonds are more expensive (lower yield) because the market prices in the benefit of the favourable asymmetry.`
  },

  // ══════════════════════════════════════════════════════════
  // 14. TREYNOR + JENSEN'S ALPHA
  // ══════════════════════════════════════════════════════════
  {
    id: 'treynor-alpha',
    subject: 'Portfolio Management',
    name: 'Treynor Ratio & Jensen\'s Alpha',
    tagline: 'Measuring performance when the portfolio is part of something bigger',
    bigIdea: `Sharpe ratio uses total risk (σ). But if a portfolio is just one piece of a larger diversified fund, <strong>unsystematic risk doesn't matter</strong> — it's already been diversified away at the fund level. In that context, you should only measure performance relative to the <em>systematic</em> risk taken, which is exactly what Treynor and Jensen's Alpha do.`,
    formula: `Treynor = (<span class="hi">Rp</span> − <span class="hi2">Rf</span>) / <span class="hi3">βp</span><br><small style="font-size:0.85rem">α = <span class="hi">Rp</span> − [<span class="hi2">Rf</span> + β(<span class="hi3">Rm</span>−<span class="hi2">Rf</span>)]</small>`,
    vars: [
      { sym: 'Treynor', def: 'Excess return per unit of systematic risk (beta) — higher is better' },
      { sym: 'α (Alpha)', def: 'Actual return minus CAPM-predicted return — positive alpha = manager added value' },
      { sym: 'βp', def: 'Portfolio beta — measures only the systematic market risk the portfolio took' },
    ],
    intuition: `Think of three workers hired to take on market risk. Treynor asks: how much did each worker earn per unit of systematic risk they absorbed? Jensen's alpha asks: did the worker earn more than CAPM said they should, given the risk they took? A positive alpha means the manager genuinely added value — they weren't just rewarded for taking on more beta. A negative alpha means they destroyed value on a risk-adjusted basis.`,
    pullQuote: `"If Sharpe, Treynor, and Jensen give different rankings, it's because the portfolios differ in their degree of diversification. For well-diversified funds, Treynor and Jensen are the right tools."`,
    connected: ['sharpe', 'capm', 'port-var'],
    inputs: [
      { id: 'tj_rp', label: 'Portfolio Return', sym: 'Rp', type: 'range', min: -5, max: 30, step: 0.5, val: 14, unit: '%' },
      { id: 'tj_rf', label: 'Risk-Free Rate', sym: 'Rf', type: 'range', min: 0, max: 10, step: 0.25, val: 3, unit: '%' },
      { id: 'tj_rm', label: 'Market Return', sym: 'Rm', type: 'range', min: 2, max: 20, step: 0.5, val: 10, unit: '%' },
      { id: 'tj_beta', label: 'Portfolio Beta', sym: 'β', type: 'range', min: 0.1, max: 2.5, step: 0.1, val: 1.2, unit: '' },
      { id: 'tj_sigma', label: 'Portfolio Std Dev', sym: 'σp', type: 'range', min: 1, max: 50, step: 0.5, val: 18, unit: '%' },
    ],
    calc(v) {
      const treynor = (v.tj_rp - v.tj_rf) / v.tj_beta;
      const capm_r = v.tj_rf + v.tj_beta * (v.tj_rm - v.tj_rf);
      const alpha = v.tj_rp - capm_r;
      const sharpe = (v.tj_rp - v.tj_rf) / v.tj_sigma;
      const breakdown = `Treynor = (${v.tj_rp}%−${v.tj_rf}%) / ${v.tj_beta} = <strong>${treynor.toFixed(3)}</strong> | α = ${v.tj_rp}%−${capm_r.toFixed(2)}% = <strong>${alpha.toFixed(2)}%</strong>`;
      let insight = '';
      if (alpha > 0 && treynor > (v.tj_rm - v.tj_rf)) {
        insight = `<em>Positive alpha of ${alpha.toFixed(2)}%</em> — the manager earned more than CAPM predicted for the systematic risk taken. Treynor of ${treynor.toFixed(3)} exceeds the market's Treynor of ${(v.tj_rm - v.tj_rf).toFixed(2)}, confirming strong risk-adjusted performance. Compare to Sharpe (${sharpe.toFixed(3)}) — if Treynor is stronger relative to benchmark, the portfolio has <strong>less diversifiable risk than average</strong>.`;
      } else if (alpha < 0) {
        insight = `<em>Negative alpha of ${alpha.toFixed(2)}%</em> — the manager underperformed their CAPM expectation. Despite taking ${v.tj_beta}× market risk, the actual return of ${v.tj_rp}% fell short of the CAPM-required ${capm_r.toFixed(2)}%. The portfolio <strong>destroyed risk-adjusted value</strong>.`;
      } else {
        insight = `Alpha of ${alpha.toFixed(2)}% and Treynor of ${treynor.toFixed(3)}. The portfolio is performing in line with what the market would expect for its level of systematic risk. True skill shows as <em>consistent positive alpha</em> over time — a single period is inconclusive.`;
      }
      return { value: `Treynor = ${treynor.toFixed(3)}`, label: `Jensen's α = ${alpha.toFixed(2)}%`, breakdown, insight };
    },
    chart(v) {
      const betas = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5];
      const sml = betas.map(b => (v.tj_rf + b * (v.tj_rm - v.tj_rf)).toFixed(2));
      const portPoint = betas.map(b => b === Math.round(v.tj_beta * 4) / 4 ? v.tj_rp : null);
      return {
        labels: betas.map(b => 'β=' + b),
        datasets: [
          { label: 'Security Market Line', data: sml, borderColor: '#2d6a9f', backgroundColor: 'rgba(45,106,159,0.06)', tension: 0.1, pointRadius: 3 },
        ],
        xLabel: 'Beta (β)', yLabel: 'Return (%)',
        caption: 'Assets above the SML have positive alpha (undervalued); below have negative alpha (overvalued)'
      };
    },
    traps: [
      { label: 'Which metric to use — the key rule', text: '<strong>Standalone portfolio → use Sharpe</strong> (total risk matters). <strong>Portfolio that is one component of a larger fund → use Treynor or Jensen\'s Alpha</strong> (only systematic risk matters). The exam will specify the context — read it carefully.' },
      { label: 'Same beta does not mean same ranking', text: 'If two portfolios have the same beta, Treynor and Jensen\'s Alpha will give the <strong>same ranking</strong>. If they have different betas, Treynor (a ratio) and Alpha (an absolute number) can give different rankings — and both can differ from Sharpe.' },
    ],
    reality: `Jensen's Alpha is the most commonly cited measure of active manager skill in academic finance. Decades of research have found that most active fund managers have negative alpha after fees — meaning passive index funds systematically outperform on a risk-adjusted basis.`
  },

  // ══════════════════════════════════════════════════════════
  // 15. LIFO TO FIFO
  // ══════════════════════════════════════════════════════════
  {
    id: 'lifo-fifo',
    subject: 'Financial Statement Analysis',
    name: 'LIFO to FIFO Adjustment',
    tagline: 'Making two companies comparable when they use different inventory methods',
    bigIdea: `LIFO and FIFO are two different ways of accounting for the same physical inventory. In rising price environments, they produce <strong>dramatically different financial statements</strong> — different costs of goods sold, different profits, different taxes, different balance sheet values. Before you compare any two companies, you must ensure they're on the same accounting basis. The LIFO reserve is the bridge.`,
    formula: `FIFO NI = LIFO NI + <span class="hi">ΔLIFO Reserve</span> × (1 − <span class="hi2">t</span>)`,
    vars: [
      { sym: 'LIFO Reserve', def: 'The cumulative difference between FIFO and LIFO inventory on the balance sheet (disclosed in footnotes)' },
      { sym: 'ΔLIFO Reserve', def: 'Change in LIFO reserve during the period = LIFO Reserve (end) − LIFO Reserve (begin)' },
      { sym: '(1−t)', def: 'Tax adjustment — FIFO profits are higher, so taxes would have been higher too; net of tax gives comparable NI' },
    ],
    intuition: `In a world of rising prices, LIFO says "I sold my most recently purchased (expensive) inventory first." This gives you high COGS, low gross profit, and lower taxes. FIFO says "I sold my oldest (cheap) inventory first." This gives you low COGS, high gross profit, and higher taxes. The LIFO reserve is exactly the cumulative inventory understatement on the balance sheet — adding it back to inventory and adjusting for taxes converts everything to FIFO as if the company had always used FIFO.`,
    pullQuote: `"The LIFO reserve is one of the most information-rich numbers in a US company's footnotes. It tells you exactly how much reported profits have been understated relative to FIFO."`,
    connected: ['dupont', 'eps'],
    inputs: [
      { id: 'lf_lifo_ni', label: 'LIFO Net Income ($)', sym: 'LIFO NI', type: 'number', min: 0, max: 1000000, step: 5000, val: 200000, unit: '$' },
      { id: 'lf_res_beg', label: 'LIFO Reserve (Beginning)', sym: 'Res₀', type: 'number', min: 0, max: 500000, step: 1000, val: 40000, unit: '$' },
      { id: 'lf_res_end', label: 'LIFO Reserve (Ending)', sym: 'Res₁', type: 'number', min: 0, max: 500000, step: 1000, val: 55000, unit: '$' },
      { id: 'lf_t', label: 'Tax Rate', sym: 't', type: 'range', min: 0, max: 50, step: 1, val: 25, unit: '%' },
    ],
    calc(v) {
      const delta_res = v.lf_res_end - v.lf_res_beg;
      const fifo_ni = v.lf_lifo_ni + delta_res * (1 - v.lf_t / 100);
      const fifo_inv = v.lf_res_end; // FIFO inventory = LIFO inventory + ending reserve
      const diff = fifo_ni - v.lf_lifo_ni;
      const breakdown = `ΔLIFO Reserve = $${v.lf_res_end.toLocaleString()} − $${v.lf_res_beg.toLocaleString()} = <strong>$${delta_res.toLocaleString()}</strong> | FIFO NI = $${v.lf_lifo_ni.toLocaleString()} + $${delta_res.toLocaleString()} × (1−${v.lf_t}%) = <strong>$${fifo_ni.toLocaleString()}</strong>`;
      let insight = '';
      if (delta_res > 0) {
        insight = `The LIFO reserve <em>increased by $${delta_res.toLocaleString()}</em> this period — prices are rising. LIFO charged more expensive recent inventory to COGS, depressing reported profits. Converting to FIFO adds back <strong>$${diff.toLocaleString()}</strong> to net income (after tax). The FIFO NI of $${fifo_ni.toLocaleString()} is <em>${((diff / v.lf_lifo_ni) * 100).toFixed(1)}% higher</em> than LIFO NI — a meaningful difference for comparison purposes.`;
      } else if (delta_res < 0) {
        insight = `The LIFO reserve <em>decreased by $${Math.abs(delta_res).toLocaleString()}</em> — this is a "LIFO liquidation." Prices may be falling, or the company sold more than it bought. When the reserve shrinks, LIFO actually shows <strong>higher profits than FIFO</strong> in that period. FIFO NI of $${fifo_ni.toLocaleString()} is lower than LIFO NI — the opposite of the usual relationship.`;
      } else {
        insight = `The LIFO reserve is unchanged — prices were stable this period. LIFO and FIFO produce the <strong>same income</strong> when prices don't change. The reserve accumulated in prior periods ($${v.lf_res_end.toLocaleString()}) still represents a cumulative balance sheet understatement of inventory.`;

      { label: 'IFRS prohibits LIFO entirely', text: 'This is a favourite exam fact: <strong>IFRS does not permit LIFO</strong>. Only US GAAP allows it. So if you\'re comparing a US company (LIFO possible) with a European company (IFRS, FIFO only), you must always adjust the US company to FIFO for a valid comparison.' },
    ],

    formula: `FCFE = <span class="hi">NI</span> + NCC − FCInv − WCInv + <span class="hi2">Net Borrowing</span><br><small style="font-size:0.85rem">FCFF = NI + NCC + <span class="hi3">Int×(1−t)</span> − FCInv − WCInv</small>`,

      { sym: 'WCInv', def: 'Working capital investment — an increase in net working capital consumes cash' },

    ],
    intuition: `Start with net income. Add back depreciation (it reduced NI but no cash left the building). Subtract capex (real cash spent on equipment). Subtract working capital growth (cash tied up in receivables and inventory). For FCFE, also add net new borrowing (debt raised on behalf of equity holders). What remains is the <strong>true cash the business generated that can be returned to shareholders</strong> — through dividends, buybacks, or retained for growth.`,
    pullQuote: `"FCFF is discounted at WACC to get enterprise value. FCFE is discounted at the cost of equity to get equity value. The two approaches must give the same answer — if they don't, you made an error."`,

      { label: 'NCC includes depreciation but also others', text: 'Non-cash charges include depreciation, amortisation, deferred taxes, and stock-based compensation. All are added back to NI because they reduced accounting profit without reducing actual cash. The exam often tests whether you know which items qualify.' },

  // ══════════════════════════════════════════════════════════
  // 17. FORWARD PRICING
  // ══════════════════════════════════════════════════════════
  {
    id: 'forward-price',
    subject: 'Derivatives',
    name: 'Forward Pricing',
    tagline: 'The no-arbitrage price of an asset delivered in the future',
    bigIdea: `A forward contract locks in a price today for buying or selling an asset in the future. What should that price be? Exactly the amount where neither party gets a free lunch. If the forward price deviated from this level, an arbitrageur would immediately exploit it — so <strong>no-arbitrage logic pins the forward price precisely</strong>. This is the first principle of all derivatives pricing.`,
    formula: `F₀ = <span class="hi">S₀</span> × (1+<span class="hi2">r</span>)^<span class="hi3">T</span>`,
    vars: [
      { sym: 'F₀', def: 'The no-arbitrage forward price agreed today for delivery at time T' },
      { sym: 'S₀', def: 'Current spot price of the underlying asset' },
      { sym: 'r', def: 'Risk-free rate for the period (the "cost of carry")' },
      { sym: 'T', def: 'Time to delivery in years' },
    ],
    intuition: `Here's why the formula must hold: if you want the asset at time T, you have two choices. Option 1: Buy it today for S₀ and hold it — but this ties up capital earning the risk-free rate. Option 2: Enter a forward contract and invest S₀ in T-bills instead. For no-arbitrage, these must cost the same. So the fair forward price equals the spot price <strong>compounded at the risk-free rate</strong> for the holding period — this is the cost of carry.`,
    pullQuote: `"If the actual forward price is higher than F₀, sell the forward and buy the spot (cash-and-carry). If lower, buy the forward and short the spot (reverse cash-and-carry). Both produce risk-free profit."`,
    connected: ['put-call', 'tvm'],
    inputs: [
      { id: 'fp_s', label: 'Spot Price S₀ ($)', sym: 'S₀', type: 'range', min: 10, max: 500, step: 5, val: 100, unit: '$' },
      { id: 'fp_r', label: 'Risk-Free Rate', sym: 'r', type: 'range', min: 0, max: 15, step: 0.25, val: 5, unit: '%' },
      { id: 'fp_t', label: 'Time to Delivery (years)', sym: 'T', type: 'range', min: 0.1, max: 5, step: 0.1, val: 1, unit: 'yr' },
      { id: 'fp_benefit', label: 'PV of Benefits (dividends etc.) ($)', sym: 'PV(Ben)', type: 'number', min: 0, max: 50, step: 0.5, val: 0, unit: '$' },
      { id: 'fp_cost', label: 'PV of Costs (storage etc.) ($)', sym: 'PV(Cost)', type: 'number', min: 0, max: 50, step: 0.5, val: 0, unit: '$' },
    ],
    calc(v) {
      const base = (v.fp_s - v.fp_benefit + v.fp_cost);
      const F = base * Math.pow(1 + v.fp_r / 100, v.fp_t);
      const F_simple = v.fp_s * Math.pow(1 + v.fp_r / 100, v.fp_t);
      const carry_cost = F_simple - v.fp_s;
      const breakdown = `F₀ = ($${v.fp_s} − $${v.fp_benefit} + $${v.fp_cost}) × (1+${v.fp_r}%)^${v.fp_t} = <strong>$${F.toFixed(2)}</strong>`;
      let insight = '';
      const premium = ((F / v.fp_s - 1) * 100).toFixed(2);
      if (v.fp_benefit > 0) {
        insight = `Benefits (dividends/coupons worth $${v.fp_benefit}) <em>reduce the forward price</em> because the seller gives them up by holding the asset. The forward buyer doesn't receive them, so the agreed price is lower. Forward price of <strong>$${F.toFixed(2)}</strong> is ${premium}% ${F > v.fp_s ? 'above' : 'below'} spot.`;
      } else if (v.fp_cost > 0) {
        insight = `Storage or insurance costs of $${v.fp_cost} <em>increase the forward price</em> — the seller must be compensated for bearing those costs during the holding period. The forward of <strong>$${F.toFixed(2)}</strong> reflects both the cost of carry ($${carry_cost.toFixed(2)}) and storage costs.`;
      } else {
        insight = `The forward price of <strong>$${F.toFixed(2)}</strong> is ${premium}% above the spot price of $${v.fp_s}. This premium equals the cost of carry — the risk-free return earned by investing $${v.fp_s} for ${v.fp_t} year(s). If the actual forward traded at any other price, an arbitrageur would exploit the gap instantly.`;
      }
      return { value: `F₀ = $${F.toFixed(2)}`, label: `Cost of carry: $${(F - v.fp_s).toFixed(2)}`, breakdown, insight };
    },
    chart(v) {
      const ts = [0.25, 0.5, 0.75, 1, 1.5, 2, 3, 5];
      const base = v.fp_s - v.fp_benefit + v.fp_cost;
      return {
        labels: ts.map(t => t + ' yr'),
        datasets: [
          { label: 'Forward Price', data: ts.map(t => (base * Math.pow(1 + v.fp_r / 100, t)).toFixed(2)), borderColor: '#b8860b', backgroundColor: 'rgba(184,134,11,0.06)', tension: 0.3, pointRadius: 4 },
          { label: 'Spot Price', data: ts.map(() => v.fp_s), borderColor: '#aaaaaa', borderDash: [5, 5], pointRadius: 0, borderWidth: 1.5 },
        ],
        xLabel: 'Time to Delivery (years)', yLabel: 'Price ($)',
        caption: 'Forward price rises above spot as time to delivery increases — reflecting the growing cost of carry'
      };
    },
    traps: [
      { label: 'Benefits reduce the forward price; costs increase it', text: 'If the underlying pays dividends or coupons (benefits to the holder), the forward buyer misses out — so the forward price is <strong>reduced</strong> by PV(benefits). Storage or insurance costs are borne by the holder, so the forward buyer must pay for them — forward price is <strong>increased</strong> by PV(costs).' },
      { label: 'Value of a forward contract after initiation', text: 'At initiation, a forward contract has zero value. After time passes, its value changes: <strong>Long forward value = S_t − F₀/(1+r)^(T−t)</strong>. The current spot minus the PV of the original forward price. This is distinct from the forward price itself.' },
    ],
    reality: `Forward contracts are used everywhere in global finance — currency forwards for hedging FX risk, commodity forwards for farmers and airlines, equity forwards for institutions. Every futures contract traded on an exchange is a standardised, exchange-traded version of a forward agreement.`
  },

  // ══════════════════════════════════════════════════════════
  // 18. BAYES' FORMULA
  // ══════════════════════════════════════════════════════════
  {
    id: 'bayes',
    subject: 'Quantitative Methods',
    name: "Bayes' Formula",
    tagline: 'How new information should rationally update your beliefs',
    bigIdea: `You start with a belief about the probability of something (the <em>prior</em>). Then new evidence arrives. Bayes' formula tells you precisely <strong>how much to update your belief</strong> given that evidence. It is the mathematical foundation of rational inference under uncertainty — and one of the most intellectually beautiful ideas in all of probability theory.`,
    formula: `P(A|B) = <span class="hi">P(B|A)</span> × <span class="hi2">P(A)</span> / <span class="hi3">P(B)</span>`,
    vars: [
      { sym: 'P(A)', def: 'Prior probability — your belief about A before seeing the evidence' },
      { sym: 'P(B|A)', def: 'Likelihood — the probability of observing B if A is true' },
      { sym: 'P(B)', def: 'Total probability of B — computed as P(B|A)×P(A) + P(B|Aᶜ)×P(Aᶜ)' },
      { sym: 'P(A|B)', def: 'Posterior probability — your updated belief about A after observing B' },
    ],
    intuition: `Imagine a medical test for a rare disease. The disease affects 1% of people. The test is 95% accurate. You test positive. What is the probability you actually have the disease? Most people instinctively say "95%." The correct answer, via Bayes, is only about 16%. Why? Because the test generates many false positives on the vast 99% of healthy people, drowning out the true positives. <strong>Without updating for the prior probability of the disease, you dramatically overstate the risk.</strong> This counterintuitive result is why Bayes matters.`,
    pullQuote: `"Bayes' theorem is the mathematical embodiment of open-mindedness — it tells you exactly how to change your mind in proportion to the strength of new evidence."`,
    connected: ['tvm'],
    inputs: [
      { id: 'bay_pa', label: 'Prior P(A) — base rate', sym: 'P(A)', type: 'range', min: 1, max: 99, step: 1, val: 30, unit: '%' },
      { id: 'bay_pba', label: 'P(B|A) — signal if A is true', sym: 'P(B|A)', type: 'range', min: 1, max: 99, step: 1, val: 80, unit: '%' },
      { id: 'bay_pbna', label: 'P(B|Aᶜ) — false positive rate', sym: 'P(B|Aᶜ)', type: 'range', min: 1, max: 99, step: 1, val: 20, unit: '%' },
    ],
    calc(v) {
      const pa = v.bay_pa / 100;
      const pba = v.bay_pba / 100;
      const pbna = v.bay_pbna / 100;
      const pna = 1 - pa;
      const pb = pba * pa + pbna * pna;
      const paob = pba * pa / pb;
      const update = ((paob - pa) * 100).toFixed(1);
      const breakdown = `P(B) = ${v.bay_pba}%×${v.bay_pa}% + ${v.bay_pbna}%×${100 - v.bay_pa}% = <strong>${(pb * 100).toFixed(2)}%</strong> | P(A|B) = <strong>${(paob * 100).toFixed(2)}%</strong>`;
      const direction = paob > pa ? 'increased' : 'decreased';
      const strength = Math.abs(paob - pa) / pa;
      let insight = '';
      if (strength < 0.1) {
        insight = `The evidence B is <em>almost equally likely</em> whether or not A is true — so it barely updates your belief. Prior: ${v.bay_pa}% → Posterior: <strong>${(paob * 100).toFixed(1)}%</strong>. Weak signals that are nearly as likely under A or not-A provide almost no information.`;
      } else if (paob > pa) {
        insight = `Observing B <em>increases</em> the probability of A from ${v.bay_pa}% to <strong>${(paob * 100).toFixed(1)}%</strong> — an update of +${update} percentage points. The signal is informative because B is ${(pba / pbna).toFixed(1)}× more likely when A is true than when it isn't. The stronger this ratio, the more Bayesian updating occurs.`;
      } else {
        insight = `Observing B actually <em>decreases</em> the probability of A from ${v.bay_pa}% to <strong>${(paob * 100).toFixed(1)}%</strong>. This seems paradoxical — B occurred, but A became less likely? Yes: when B is more likely when A is <em>false</em>, observing B is evidence against A. This is the power of rigorous Bayesian reasoning.`;
      }
      return { value: `P(A|B) = ${(paob * 100).toFixed(2)}%`, label: `Prior was ${v.bay_pa}%`, breakdown, insight };
    },
    chart(v) {
      const pba = v.bay_pba / 100, pbna = v.bay_pbna / 100;
      const priors = Array.from({ length: 20 }, (_, i) => (i + 1) * 5);
      const posteriors = priors.map(p => {
        const pa = p / 100, pna = 1 - pa;
        const pb = pba * pa + pbna * pna;
        return (pba * pa / pb * 100).toFixed(1);
      });
      return {
        labels: priors.map(p => p + '%'),
        datasets: [
          { label: 'Posterior P(A|B)', data: posteriors, borderColor: '#2d6a9f', backgroundColor: 'rgba(45,106,159,0.08)', tension: 0.4, pointRadius: 3 },
          { label: 'Prior = Posterior (no update)', data: priors.map(p => p.toFixed(1)), borderColor: '#aaaaaa', borderDash: [5, 5], pointRadius: 0, borderWidth: 1.5 },
        ],
        xLabel: 'Prior P(A)', yLabel: 'Posterior P(A|B)',
        caption: 'When the curve lies above the diagonal, observing B is positive evidence for A. Below = negative evidence.'
      };
    },
    traps: [
      { label: 'Always compute P(B) using total probability', text: 'P(B) must account for <strong>all ways B can occur</strong>: P(B) = P(B|A)×P(A) + P(B|Aᶜ)×P(Aᶜ). A common error is using P(B|A) alone in the denominator — this ignores false positives and gives an answer that is too high.' },
      { label: 'The base rate matters enormously', text: 'Even a very accurate signal provides weak evidence when the prior probability (base rate) is very low. If the base rate is 1%, even a 95% accurate test gives a posterior of only ~16%. <strong>Always consider the base rate</strong> before interpreting conditional probabilities.' },
    ],
    reality: `Bayes' theorem is used everywhere in modern finance: spam filters, credit scoring models, fraud detection, and quantitative trading strategies all rely on Bayesian updating. In medicine, doctors are taught to think in prior probabilities and likelihoods to avoid diagnostic errors like the one in the intuition example above.`
  },


// ══════════════════════════════════════════════════════════
  // 19. YTM / YTC / YTW
  // ══════════════════════════════════════════════════════════
  {
    id: 'ytm-ytc-ytw',
    subject: 'Fixed Income',
    name: 'YTM, YTC & YTW',
    tagline: 'What return does this bond actually promise you?',
    bigIdea: `A bond's coupon rate tells you what the issuer promised to pay when the bond was issued. The <strong>yield to maturity (YTM)</strong> tells you what return you'd actually earn if you bought the bond today at its current market price and held it until it matures. These are almost always different numbers — and the difference is the entire story of how bond markets work.`,
    formula: `Price = Σ [<span class="hi">C</span> / (1+<span class="hi2">YTM</span>/2)^t] + [<span class="hi3">FV</span> / (1+YTM/2)^n]`,
    vars: [
      { sym: 'YTM', def: 'Yield to Maturity — the single discount rate that makes the PV of all cash flows equal the current price. Solve iteratively (or use BA II Plus).' },
      { sym: 'YTC', def: 'Yield to Call — same calculation but substitute the call price for face value and the call date for maturity' },
      { sym: 'YTW', def: 'Yield to Worst — the lowest of YTM, YTC, and any other yield to call date. The true floor on your return.' },
      { sym: 'C', def: 'Coupon payment per period (annual coupon ÷ 2 for semiannual)' },
    ],
    intuition: `Think of YTM as the bond market's answer to "what interest rate am I really getting on this investment?" If you pay more than face value for a bond, your YTM will be lower than the coupon rate — you're overpaying for those cash flows. If you pay less than face value, your YTM will be higher — you're getting a bargain. The coupon rate is fixed forever; the YTM moves every time the price moves. YTC matters because callable bonds give the issuer the right to redeem early — usually when rates fall, which is exactly when you don't want to lose the bond. YTW is what a cautious investor quotes because it tells you: in the worst case, what am I guaranteed to earn?`,
    pullQuote: `"The coupon rate is the issuer's promise from the past. The YTM is the market's verdict on that promise today."`,
    connected: ['bond-price', 'mod-duration', 'convexity'],
    inputs: [
      { id: 'ytm_price', label: 'Current Bond Price ($)', sym: 'Price', type: 'range', min: 700, max: 1300, step: 10, val: 950, unit: '$' },
      { id: 'ytm_fv', label: 'Face Value ($)', sym: 'FV', type: 'number', min: 1000, max: 1000, step: 0, val: 1000, unit: '$' },
      { id: 'ytm_coupon', label: 'Annual Coupon Rate', sym: 'c%', type: 'range', min: 0, max: 15, step: 0.25, val: 6, unit: '%' },
      { id: 'ytm_years', label: 'Years to Maturity', sym: 'n', type: 'range', min: 1, max: 30, step: 1, val: 10, unit: 'yrs' },
      { id: 'ytm_callprice', label: 'Call Price ($)', sym: 'CP', type: 'number', min: 1000, max: 1100, step: 5, val: 1050, unit: '$' },
      { id: 'ytm_callyears', label: 'Years to Call', sym: 'nc', type: 'range', min: 1, max: 10, step: 1, val: 3, unit: 'yrs' },
    ],
    calc(v) {
      // Solve YTM numerically (Newton's method)
      const n = v.ytm_years * 2;
      const c = (v.ytm_coupon / 100 * v.ytm_fv) / 2;
      const price = v.ytm_price;
      let ytm = 0.05;
      for (let i = 0; i < 100; i++) {
        const r = ytm / 2;
        let pv = 0, dpv = 0;
        for (let t = 1; t <= n; t++) {
          pv += c / Math.pow(1 + r, t);
          dpv -= t * c / Math.pow(1 + r, t + 1);
        }
        pv += v.ytm_fv / Math.pow(1 + r, n);
        dpv -= n * v.ytm_fv / Math.pow(1 + r, n + 1);
        const diff = pv - price;
        if (Math.abs(diff) < 0.0001) break;
        ytm -= diff / (dpv * 0.5);
      }
      // YTC
      const nc = v.ytm_callyears * 2;
      let ytc = 0.05;
      for (let i = 0; i < 100; i++) {
        const r = ytc / 2;
        let pv = 0, dpv = 0;
        for (let t = 1; t <= nc; t++) {
          pv += c / Math.pow(1 + r, t);
          dpv -= t * c / Math.pow(1 + r, t + 1);
        }
        pv += v.ytm_callprice / Math.pow(1 + r, nc);
        dpv -= nc * v.ytm_callprice / Math.pow(1 + r, nc + 1);
        const diff = pv - price;
        if (Math.abs(diff) < 0.0001) break;
        ytc -= diff / (dpv * 0.5);
      }
      const ytw = Math.min(ytm, ytc);
      const breakdown = `YTM = <strong>${(ytm * 100).toFixed(3)}%</strong> | YTC = <strong>${(ytc * 100).toFixed(3)}%</strong> | YTW = <strong>${(ytw * 100).toFixed(3)}%</strong>`;
      let insight = '';
      const coupon = v.ytm_coupon;
      if (v.ytm_price < v.ytm_fv) {
        insight = `Bond is trading at a <em>discount</em> ($${v.ytm_price} < $${v.ytm_fv}), so YTM of <strong>${(ytm * 100).toFixed(2)}%</strong> is <em>above</em> the coupon rate of ${coupon}%. You're buying future cash flows cheaply — the price appreciation to par adds to your return. YTW is ${(ytw * 100).toFixed(2)}% — in the worst case (if called early at $${v.ytm_callprice}), that's still your guaranteed floor.`;
      } else if (v.ytm_price > v.ytm_fv) {
        insight = `Bond is trading at a <em>premium</em> ($${v.ytm_price} > $${v.ytm_fv}), so YTM of <strong>${(ytm * 100).toFixed(2)}%</strong> is <em>below</em> the coupon rate of ${coupon}%. You're paying extra for those above-market coupons — the price decline to par at maturity reduces your overall return. YTW of ${(ytw * 100).toFixed(2)}% is your real floor.`;
      } else {
        insight = `Bond is trading at <em>par</em> — price equals face value. In this special case, YTM equals exactly the coupon rate of ${coupon}%. This is the baseline relationship: par price = coupon rate = YTM. Any deviation from par immediately drives a wedge between the coupon rate and the YTM.`;
      }
      return { value: `YTM = ${(ytm * 100).toFixed(3)}%`, label: `YTW = ${(ytw * 100).toFixed(3)}%`, breakdown, insight };
    },
    chart(v) {
      const prices = [];
      const ytms = [];
      for (let p = 700; p <= 1300; p += 30) {
        const n = v.ytm_years * 2;
        const c = (v.ytm_coupon / 100 * v.ytm_fv) / 2;
        let ytm = 0.05;
        for (let i = 0; i < 100; i++) {
          const r = ytm / 2;
          let pv = 0, dpv = 0;
          for (let t = 1; t <= n; t++) { pv += c / Math.pow(1+r,t); dpv -= t*c/Math.pow(1+r,t+1); }
          pv += v.ytm_fv / Math.pow(1+r,n); dpv -= n*v.ytm_fv/Math.pow(1+r,n+1);
          const diff = pv - p; if (Math.abs(diff) < 0.001) break;
          ytm -= diff / (dpv * 0.5);
        }
        prices.push(p);
        ytms.push((ytm * 100).toFixed(3));
      }
      return {
        labels: prices.map(p => '$' + p),
        datasets: [{ label: 'YTM (%)', data: ytms, borderColor: '#b8860b', backgroundColor: 'rgba(184,134,11,0.06)', tension: 0.4, pointRadius: 2 }],
        xLabel: 'Bond Price ($)', yLabel: 'YTM (%)',
        caption: 'As price rises, YTM falls — the fundamental inverse relationship between bond prices and yields'
      };
    },
    traps: [
      { label: 'YTM assumes reinvestment at the same rate', text: 'YTM implicitly assumes every coupon you receive is reinvested at the same YTM rate. In reality this rarely happens, so the realised return often differs from the stated YTM. This reinvestment risk is higher for longer-maturity, higher-coupon bonds.' },
      { label: 'For callable bonds, always quote YTW not YTM', text: 'When a bond has call features, quoting YTM is misleading because it ignores the possibility of early redemption. <strong>YTW is the more conservative and honest measure</strong> because it reflects the worst-case scenario from the investor\'s perspective.' },
    ],
    reality: `When you see a bond quoted at "yield 4.85%", that's the YTM. Every bond trading desk in the world runs this same iterative calculation hundreds of thousands of times per day. The BA II Plus does it for you in the exam: enter N, I/Y, PV, PMT, FV and compute the missing variable.`
  },

  {

    tagline: 'The yield curve is made of two different kinds of rates — do you know which is which?',
    bigIdea: `A <strong>spot rate</strong> is the yield on a zero-coupon bond maturing at a specific date — a pure, unambiguous rate for lending money from today until that date. A <strong>forward rate</strong> is the rate implied for a future lending period — what the market is pricing in for, say, the one-year rate two years from now. These two are linked by a powerful no-arbitrage relationship: you should earn the same return whether you invest for two years outright, or invest for one year and then roll over at the implied forward rate.`,
    formula: `(1 + <span class="hi">S₂</span>)² = (1 + <span class="hi2">S₁</span>) × (1 + <span class="hi3">₁f₁</span>)`,
    vars: [
      { sym: 'Sₙ', def: 'Spot rate for n years — the all-in yield from today to year n, no coupons' },
      { sym: '₁f₁', def: 'One-year forward rate, one year from now — the rate implied between year 1 and year 2' },
      { sym: 'No-arbitrage', def: 'Two paths to the same destination must cost the same — otherwise someone profits for free' },
    ],
    intuition: `Imagine you want to park $1,000 for two years. You have two equivalent choices. First, invest at the 2-year spot rate and lock in your return today. Second, invest at the 1-year spot rate, and then at whatever the 1-year rate turns out to be in year two. If markets are efficient, these must give you identical outcomes — otherwise everyone would pile into the better option until prices adjusted. The forward rate is exactly the future 1-year rate that makes these two choices identical. It is the market's <strong>implied forecast of future short-term rates</strong>, embedded in the shape of the yield curve.`,
    pullQuote: `"A steep upward-sloping yield curve implies that forward rates are above current spot rates — the market expects short-term rates to rise. An inverted curve implies the opposite."`,
    connected: ['bond-price', 'ytm-ytc-ytw', 'forward-price'],
    inputs: [
      { id: 'sf_s1', label: '1-Year Spot Rate S₁', sym: 'S₁', type: 'range', min: 0.5, max: 10, step: 0.25, val: 3, unit: '%' },
      { id: 'sf_s2', label: '2-Year Spot Rate S₂', sym: 'S₂', type: 'range', min: 0.5, max: 10, step: 0.25, val: 4, unit: '%' },
      { id: 'sf_s3', label: '3-Year Spot Rate S₃', sym: 'S₃', type: 'range', min: 0.5, max: 10, step: 0.25, val: 4.5, unit: '%' },
    ],
    calc(v) {
      const s1 = v.sf_s1 / 100, s2 = v.sf_s2 / 100, s3 = v.sf_s3 / 100;
      const f1_1 = ((Math.pow(1 + s2, 2) / (1 + s1)) - 1) * 100;
      const f1_2 = ((Math.pow(1 + s3, 3) / Math.pow(1 + s2, 2)) - 1) * 100;
      const f2_1 = ((Math.pow(1 + s3, 3) / (1 + s1)) - 1) / 2 * 100; // approx 2yr fwd from yr1
      const breakdown = `₁f₁ = (1+${v.sf_s2}%)²/(1+${v.sf_s1}%) − 1 = <strong>${f1_1.toFixed(3)}%</strong> | ₂f₁ = <strong>${f1_2.toFixed(3)}%</strong>`;
      let insight = '';
      if (v.sf_s2 > v.sf_s1) {
        insight = `The yield curve is <em>upward sloping</em> (S₂ ${v.sf_s2}% > S₁ ${v.sf_s1}%). This means the implied forward rate of <strong>${f1_1.toFixed(2)}%</strong> is <em>above</em> today's 1-year spot rate — the market is pricing in rising short-term rates. A steep curve implies strong expected rate increases ahead.`;
      } else if (v.sf_s2 < v.sf_s1) {
        insight = `The yield curve is <em>inverted</em> (S₂ ${v.sf_s2}% < S₁ ${v.sf_s1}%). The implied forward rate of <strong>${f1_1.toFixed(2)}%</strong> is <em>below</em> today's 1-year spot rate — the market expects short-term rates to <em>fall</em>. An inverted curve has historically been a reliable recession signal because it reflects expectations of future rate cuts.`;
      } else {
        insight = `The yield curve is <em>flat</em> — S₁ and S₂ are equal at ${v.sf_s1}%. The implied forward rate equals the current spot rate (${f1_1.toFixed(2)}%), meaning the market expects no change in short-term rates. A flat curve often appears during transitions between rising and falling rate environments.`;
      }
      return { value: `₁f₁ = ${f1_1.toFixed(3)}%`, label: `₂f₁ = ${f1_2.toFixed(3)}%`, breakdown, insight };
    },
    chart(v) {
      const s1 = v.sf_s1 / 100, s2 = v.sf_s2 / 100, s3 = v.sf_s3 / 100;
      const f11 = (Math.pow(1+s2,2)/(1+s1) - 1) * 100;
      const f12 = (Math.pow(1+s3,3)/Math.pow(1+s2,2) - 1) * 100;
      return {
        labels: ['Year 1', 'Year 2', 'Year 3'],
        datasets: [
          { label: 'Spot Rates', data: [v.sf_s1, v.sf_s2, v.sf_s3], borderColor: '#2d6a9f', backgroundColor: 'rgba(45,106,159,0.08)', tension: 0.3, pointRadius: 5 },
          { label: 'Implied Forward Rates', data: [v.sf_s1, f11.toFixed(3), f12.toFixed(3)], borderColor: '#b8860b', borderDash: [5,5], backgroundColor: 'rgba(184,134,11,0.04)', tension: 0.3, pointRadius: 5 },
        ],
        xLabel: 'Maturity', yLabel: 'Rate (%)',
        caption: 'When the spot curve slopes up, forward rates lie above it — the market implies future rates will be higher'
      };
    },
    traps: [
      { label: 'Spot rates are not the same as YTM', text: 'YTM is a single blended rate for a coupon-paying bond. Spot rates are pure rates for each individual cash flow date. To value a bond precisely, you discount each cash flow at its own spot rate — this is called the "arbitrage-free" valuation approach.' },
      { label: 'Forward rates are expectations, not guarantees', text: 'The forward rate tells you what the market has <strong>priced in</strong> for future rates — not what rates will actually be. Realised rates frequently differ from implied forward rates. What matters for the exam is understanding how to calculate and interpret them, not predicting the future.' },
    ],
    reality: `Central banks around the world monitor the yield curve shape obsessively. When the US 2-year/10-year spread inverts (the 2-year yield rises above the 10-year), it has preceded every US recession in the past 50 years — because it signals the market expects future short-term rates (and thus the economy) to be weaker than current ones.`
  },

  // ══════════════════════════════════════════════════════════
  // 21. Z-SCORES & CONFIDENCE INTERVALS
  // ══════════════════════════════════════════════════════════
  {
    id: 'z-score-ci',
    subject: 'Quantitative Methods',
    name: 'Z-Scores & Confidence Intervals',
    tagline: 'How many standard deviations away is this result — and should you be surprised?',
    bigIdea: `A z-score answers one simple question: <strong>how unusual is this observation?</strong> It converts any measurement into a universal currency — standard deviations from the mean — so you can compare results across completely different distributions. Confidence intervals flip this logic around: instead of asking "how unusual is this point?", they ask "given this sample, where does the true population value probably lie?"`,
    formula: `z = (<span class="hi">X</span> − <span class="hi2">μ</span>) / <span class="hi3">σ</span> &nbsp;&nbsp; CI: <span class="hi2">X̄</span> ± z × (<span class="hi3">σ</span>/√n)`,
    vars: [
      { sym: 'z', def: 'Number of standard deviations the observation lies from the mean' },
      { sym: 'X̄ ± z×(σ/√n)', def: 'Confidence interval — the range likely containing the true population mean' },
      { sym: 'σ/√n', def: 'Standard error — how much sample means vary around the true mean; shrinks as sample size grows' },
      { sym: 'z critical values', def: '90% CI → z=1.645 | 95% CI → z=1.960 | 99% CI → z=2.576' },
    ],
    intuition: `Think of a z-score as a translator. You have a test score of 72, the class average is 65, and the standard deviation is 10. Your z-score is (72−65)/10 = 0.7 — you scored 0.7 standard deviations above average. Now you can compare this to a completely different exam with different scales. A z-score of 0 means perfectly average. A z-score of 2 means you're in approximately the top 2.3% of the distribution. For confidence intervals — imagine you weigh a random sample of 100 people and get an average of 70kg with a standard deviation of 15kg. A 95% CI says: if you repeated this sampling process thousands of times, 95% of the intervals you construct this way would capture the true population mean.`,
    pullQuote: `"A 95% confidence interval does NOT mean there's a 95% probability the true mean falls inside it — the true mean is fixed, not random. It means the interval construction process captures the true mean 95% of the time."`,
    connected: ['bayes', 'hyp-test'],
    inputs: [
      { id: 'z_x', label: 'Observed Value X', sym: 'X', type: 'range', min: 0, max: 200, step: 1, val: 115, unit: '' },
      { id: 'z_mu', label: 'Population Mean μ', sym: 'μ', type: 'range', min: 0, max: 200, step: 1, val: 100, unit: '' },
      { id: 'z_sigma', label: 'Standard Deviation σ', sym: 'σ', type: 'range', min: 1, max: 50, step: 1, val: 15, unit: '' },
      { id: 'z_n', label: 'Sample Size n', sym: 'n', type: 'range', min: 1, max: 500, step: 10, val: 100, unit: '' },
      { id: 'z_conf', label: 'Confidence Level', sym: 'CI%', type: 'range', min: 90, max: 99, step: 4.5, val: 95, unit: '%' },
    ],
    calc(v) {
      const z = (v.z_x - v.z_mu) / v.z_sigma;
      const se = v.z_sigma / Math.sqrt(v.z_n);
      const zcrit = v.z_conf >= 99 ? 2.576 : v.z_conf >= 95 ? 1.960 : 1.645;
      const margin = zcrit * se;
      const lo = (v.z_mu - margin).toFixed(2);
      const hi = (v.z_mu + margin).toFixed(2);
      // Approximate percentile
      const absZ = Math.abs(z);
      const pct = absZ > 3 ? 99.9 : absZ > 2.576 ? 99 : absZ > 1.96 ? 97.5 : absZ > 1.645 ? 95 : absZ > 1.28 ? 90 : absZ > 1 ? 84 : absZ > 0.5 ? 69 : 50;
      const tail = z > 0 ? `top ${(100 - pct).toFixed(1)}%` : `bottom ${(100 - pct).toFixed(1)}%`;
      const breakdown = `z = (${v.z_x}−${v.z_mu})/${v.z_sigma} = <strong>${z.toFixed(3)}</strong> | ${v.z_conf}% CI: [<strong>${lo}, ${hi}</strong>]`;
      let insight = '';
      if (Math.abs(z) < 1) {
        insight = `A z-score of <strong>${z.toFixed(2)}</strong> is well within one standard deviation of the mean — this is a <em>completely ordinary</em> result. About 68% of all observations fall within ±1σ. Nothing statistically remarkable here. The ${v.z_conf}% confidence interval of [${lo}, ${hi}] reflects the precision of a sample size of ${v.z_n}.`;
      } else if (Math.abs(z) < 2) {
        insight = `A z-score of <strong>${z.toFixed(2)}</strong> puts this observation in approximately the ${tail} of the distribution — moderately unusual but not extreme. About 95% of observations fall within ±2σ, so this is outside the "ordinary" range but not shocking. With a sample of ${v.z_n}, your ${v.z_conf}% CI is [${lo}, ${hi}].`;
      } else {
        insight = `A z-score of <strong>${z.toFixed(2)}</strong> is in the ${tail} — this is a statistically <em>unusual</em> result. Less than 5% of observations from this distribution would be this extreme. In hypothesis testing, a |z| > 1.96 at 95% confidence would lead you to <strong>reject the null hypothesis</strong>. The ${v.z_conf}% CI of [${lo}, ${hi}] is your estimate of where the true mean lies.`;
      }
      return { value: `z = ${z.toFixed(3)}`, label: `${v.z_conf}% CI: [${lo}, ${hi}]`, breakdown, insight };
    },
    chart(v) {
      const zcrit = v.z_conf >= 99 ? 2.576 : v.z_conf >= 95 ? 1.960 : 1.645;
      const zobs = (v.z_x - v.z_mu) / v.z_sigma;
      const pts = [];
      const ys = [];
      for (let z = -4; z <= 4; z += 0.2) {
        pts.push(z.toFixed(1));
        ys.push((Math.exp(-0.5 * z * z) / Math.sqrt(2 * Math.PI)).toFixed(4));
      }
      return {
        labels: pts,
        datasets: [
          { label: 'Normal Distribution', data: ys, borderColor: '#2d6a9f', backgroundColor: 'rgba(45,106,159,0.08)', tension: 0.4, pointRadius: 0 },
        ],
        xLabel: 'Z-score', yLabel: 'Probability Density',
        caption: `Critical values: ±1.645 (90%), ±1.96 (95%), ±2.576 (99%) | Your z = ${zobs.toFixed(2)}`
      };
    },
    traps: [
      { label: 'Wider CI does not mean more precise', text: 'A 99% CI is <em>wider</em> than a 95% CI — it captures the true mean more reliably, but the range of values it includes is larger. More confidence = less precision. This is a fundamental trade-off: you cannot simultaneously have high confidence and a narrow interval without increasing your sample size.' },
      { label: 'Use z for large samples, t for small ones', text: 'When the population standard deviation is unknown and the sample size is small (n < 30), use the <strong>t-distribution</strong> instead of the z-distribution. The t-distribution has fatter tails to reflect the additional uncertainty from estimating σ from the sample. As n grows, t approaches z.' },
    ],
    reality: `Every clinical drug trial, every quality control process in manufacturing, and every A/B test run by a technology company uses confidence intervals to decide whether an observed effect is real or just random noise. The 95% threshold (z = 1.96) is the most widely used standard in science and business — it's the line between "interesting finding" and "publishable result."`
  },

  // ══════════════════════════════════════════════════════════
  // 22. HYPOTHESIS TESTING
  // ══════════════════════════════════════════════════════════
  {
    id: 'hyp-test',
    subject: 'Quantitative Methods',
    name: 'Hypothesis Testing',
    tagline: 'Is this result real, or just random noise?',
    bigIdea: `Hypothesis testing is the formal process for deciding whether an observed result is <strong>statistically significant</strong> — genuinely caused by something real — or just a chance fluctuation you'd expect from random sampling. The entire framework is built around one counter-intuitive but powerful idea: you don't try to prove your hypothesis directly. Instead, you assume it's wrong (the null hypothesis), then ask: if it really were wrong, how likely would I be to see results this extreme just by chance?`,
    formula: `t = (<span class="hi">X̄</span> − <span class="hi2">μ₀</span>) / (<span class="hi3">s</span>/√n) &nbsp; reject H₀ if |t| > t<sub>critical</sub>`,
    vars: [
      { sym: 'H₀', def: 'Null hypothesis — the "no effect" baseline you are trying to disprove' },
      { sym: 'H₁', def: 'Alternative hypothesis — what you believe is actually true' },
      { sym: 'p-value', def: 'Probability of observing results this extreme if H₀ were true — smaller means stronger evidence against H₀' },
      { sym: 'Type I error (α)', def: 'Rejecting H₀ when it is actually true — a false positive. The significance level α is the probability of this error.' },
      { sym: 'Type II error (β)', def: 'Failing to reject H₀ when it is actually false — a false negative. Power = 1−β.' },
    ],
    intuition: `Imagine you're testing whether a fund manager has genuine skill or is just getting lucky. Your null hypothesis is "no skill — returns are random." You observe that the manager beat the benchmark 8 out of 10 years. The test asks: if the manager truly had no skill (50/50 chance each year), what's the probability of getting 8 or more wins out of 10 just by luck? If that probability is very small (below your significance level of 5%), you reject the null — the result is too unlikely to be pure luck, so skill is the more plausible explanation. If the probability is large, you cannot reject the null — the result is consistent with luck, so you have no evidence of skill.`,
    pullQuote: `"You never prove the null hypothesis false with certainty — you either reject it (strong evidence against it) or fail to reject it (insufficient evidence against it). Absence of evidence is not evidence of absence."`,
    connected: ['z-score-ci', 'bayes', 'regression'],
    inputs: [
      { id: 'ht_xbar', label: 'Sample Mean X̄', sym: 'X̄', type: 'range', min: 0, max: 20, step: 0.5, val: 12, unit: '%' },
      { id: 'ht_mu0', label: 'Null Hypothesis Value μ₀', sym: 'μ₀', type: 'range', min: 0, max: 20, step: 0.5, val: 10, unit: '%' },
      { id: 'ht_s', label: 'Sample Std Dev s', sym: 's', type: 'range', min: 0.5, max: 20, step: 0.5, val: 5, unit: '%' },
      { id: 'ht_n', label: 'Sample Size n', sym: 'n', type: 'range', min: 5, max: 500, step: 5, val: 100, unit: '' },
      { id: 'ht_alpha', label: 'Significance Level α', sym: 'α', type: 'range', min: 1, max: 10, step: 1, val: 5, unit: '%' },
    ],
    calc(v) {
      const t = (v.ht_xbar - v.ht_mu0) / (v.ht_s / Math.sqrt(v.ht_n));
      const tcrit = v.ht_alpha <= 1 ? 2.576 : v.ht_alpha <= 5 ? 1.960 : 1.645;
      const reject = Math.abs(t) > tcrit;
      const breakdown = `t = (${v.ht_xbar}% − ${v.ht_mu0}%) / (${v.ht_s}%/√${v.ht_n}) = <strong>${t.toFixed(3)}</strong> | Critical value: ±${tcrit} | <strong>${reject ? 'REJECT H₀' : 'FAIL TO REJECT H₀'}</strong>`;
      let insight = '';
      if (reject) {
        insight = `Test statistic of <strong>${t.toFixed(2)}</strong> exceeds the critical value of ±${tcrit} at the ${v.ht_alpha}% significance level — <em>reject the null hypothesis</em>. The sample mean of ${v.ht_xbar}% is statistically significantly different from the hypothesised value of ${v.ht_mu0}%. The probability of observing a difference this large by pure chance (if H₀ were true) is below ${v.ht_alpha}%. This constitutes evidence of a real effect, not random noise.`;
      } else {
        insight = `Test statistic of <strong>${t.toFixed(2)}</strong> does not exceed the critical value of ±${tcrit} at the ${v.ht_alpha}% significance level — <em>fail to reject the null hypothesis</em>. This does NOT mean H₀ is true — it means you have <em>insufficient evidence</em> to conclude otherwise. Consider: with a larger sample size (currently ${v.ht_n}), the test would become more powerful and might detect a real difference.`;
      }
      return {
        value: `t = ${t.toFixed(3)}`,
        label: reject ? '→ Reject H₀' : '→ Fail to Reject H₀',
        breakdown, insight
      };
    },
    chart(v) {
      const tcrit = v.ht_alpha <= 1 ? 2.576 : v.ht_alpha <= 5 ? 1.960 : 1.645;
      const tobs = (v.ht_xbar - v.ht_mu0) / (v.ht_s / Math.sqrt(v.ht_n));
      const pts = [], ys = [];
      for (let t = -4; t <= 4; t += 0.2) {
        pts.push(t.toFixed(1));
        ys.push((Math.exp(-0.5*t*t)/Math.sqrt(2*Math.PI)).toFixed(4));
      }
      return {
        labels: pts,
        datasets: [{ label: 't-distribution', data: ys, borderColor: '#2a7a4f', backgroundColor: 'rgba(42,122,79,0.07)', tension: 0.4, pointRadius: 0 }],
        xLabel: 't statistic', yLabel: 'Density',
        caption: `Critical values ±${tcrit} | Your t-stat = ${tobs.toFixed(2)} | ${Math.abs(tobs) > tcrit ? 'In rejection region ✓' : 'In acceptance region'}`
      };
    },
    traps: [
      { label: 'Type I vs Type II errors — always keep them straight', text: '<strong>Type I (α)</strong>: You reject H₀ but it was actually true — a false alarm. The significance level α is the probability of this. <strong>Type II (β)</strong>: You fail to reject H₀ but it was actually false — a miss. Reducing α (making the test stricter) increases β — you cannot reduce both errors simultaneously without increasing sample size.' },
      { label: 'Statistical significance ≠ economic significance', text: 'With a very large sample size, even a tiny, economically irrelevant difference can become statistically significant. A fund returning 10.001% vs a benchmark of 10.000% might be statistically significant with enough data — but the 0.001% difference has no practical meaning. Always ask: is the magnitude of the effect meaningful, not just whether it\'s non-zero?' },
    ],
    reality: `The CFA exam loves testing the logic of Type I and Type II errors and the relationship between significance level, power, and sample size. In investment research, hypothesis testing is used to evaluate whether a trading strategy's historical returns are genuinely superior or just the product of data mining and luck.`
  },

  // ══════════════════════════════════════════════════════════
  // 23. LINEAR REGRESSION
  // ══════════════════════════════════════════════════════════
  {
