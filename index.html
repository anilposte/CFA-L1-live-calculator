// ══════════════════════════════════════════════════════════
  // 13. CONVEXITY ADJUSTMENT
  // ══════════════════════════════════════════════════════════
  {
    id: 'convexity',
    subject: 'Fixed Income',
    name: 'Convexity Adjustment',
    tagline: 'Why duration alone underestimates price gains and overestimates losses',
    bigIdea: `Modified Duration gives you a linear approximation of how bond prices change with yields. But the true price-yield relationship is a <strong>curve, not a straight line</strong>. That curvature is convexity. When yields move significantly, duration alone gives you the wrong answer — convexity corrects it. And the correction is always in your favour for standard bonds.`,
    formula: `ΔP ≈ −<span class="hi">ModDur</span> × ΔYield × P + ½ × <span class="hi2">Convexity</span> × (<span class="hi3">ΔYield</span>)² × P`,
    vars: [
      { sym: '−ModDur × ΔYield × P', def: 'The duration effect — linear approximation of price change' },
      { sym: '½ × Convexity × (ΔYield)²', def: 'The convexity adjustment — always positive for option-free bonds' },
      { sym: 'Convexity', def: 'A measure of the curvature in the price-yield relationship (always positive for standard bonds)' },
    ],
    intuition: `Imagine driving along a curved road. Duration is like measuring your position using only your speed and direction — it works fine for short distances, but on a curve, you'll drift off the road if you don't account for the bend. Convexity is the bend. For option-free bonds, the curve always bends <strong>in the investor's favour</strong>: prices rise more than duration predicts when yields fall, and fall less than duration predicts when yields rise. This asymmetry is why convexity is a desirable property.`,
    pullQuote: `"All else equal, a bond with higher convexity is always preferable. It outperforms a lower-convexity bond in both rising and falling yield environments."`,
    connected: ['mod-duration', 'bond-price'],
    inputs: [
      { id: 'cv_moddur', label: 'Modified Duration', sym: 'ModDur', type: 'range', min: 0.5, max: 20, step: 0.5, val: 7, unit: '' },
      { id: 'cv_conv', label: 'Convexity', sym: 'Conv', type: 'range', min: 0, max: 200, step: 5, val: 60, unit: '' },
      { id: 'cv_dy', label: 'Yield Change', sym: 'ΔYield', type: 'range', min: -300, max: 300, step: 10, val: 100, unit: 'bps' },
      { id: 'cv_price', label: 'Bond Price ($)', sym: 'P', type: 'number', min: 100, max: 2000, step: 10, val: 1000, unit: '$' },
    ],
    calc(v) {
      const dy = v.cv_dy / 10000;
      const dur_eff = -v.cv_moddur * dy * v.cv_price;
      const conv_adj = 0.5 * v.cv_conv * dy * dy * v.cv_price;
      const total = dur_eff + conv_adj;
      const dur_only = dur_eff;
      const new_price = v.cv_price + total;
      const breakdown = `Duration effect: <strong>$${dur_eff.toFixed(2)}</strong> + Convexity adj: <strong>$${conv_adj.toFixed(2)}</strong> = <strong>$${total.toFixed(2)}</strong>`;
      const direction = v.cv_dy > 0 ? 'rising' : 'falling';
      let insight = '';
      if (v.cv_dy === 0) {
        insight = `No yield change, no price change. The convexity value of ${v.cv_conv} tells you: the larger the yield move you expect, the more valuable this convexity becomes. It always adds to (or reduces the loss in) your total return.`;
      } else if (conv_adj < 0.01) {
        insight = `With a small yield move of ${Math.abs(v.cv_dy)} bps, the convexity adjustment is tiny ($${conv_adj.toFixed(2)}). Duration's linear approximation is very accurate for small yield changes — convexity matters most for large moves of 100+ basis points.`;
      } else if (v.cv_dy > 0) {
        insight = `Yields <em>rising</em> by ${v.cv_dy} bps. Duration alone would predict a price drop of $${Math.abs(dur_only).toFixed(2)}, but convexity <strong>cushions the fall by $${conv_adj.toFixed(2)}</strong>. The true price drop is only $${Math.abs(total).toFixed(2)}. This is convexity working in your favour — the curve bends to reduce losses when yields rise.`;
      } else {
        insight = `Yields <em>falling</em> by ${Math.abs(v.cv_dy)} bps. Duration alone would predict a price gain of $${Math.abs(dur_only).toFixed(2)}, but convexity <strong>adds an extra $${conv_adj.toFixed(2)}</strong>. The true price gain is $${Math.abs(total).toFixed(2)}. This is why falling yield environments reward high-convexity bonds more than duration alone would suggest.`;
      }
      return { value: `ΔP ≈ $${total.toFixed(2)}`, label: `New Price: $${new_price.toFixed(2)}`, breakdown, insight };
    },
    chart(v) {
      const labels = [], durOnly = [], withConv = [];
      for (let dy = -300; dy <= 300; dy += 25) {
        const dyD = dy / 10000;
        const d = -v.cv_moddur * dyD * v.cv_price;
        const c = 0.5 * v.cv_conv * dyD * dyD * v.cv_price;
        labels.push(dy + 'bps');
        durOnly.push((v.cv_price + d).toFixed(2));
        withConv.push((v.cv_price + d + c).toFixed(2));
      }
      return {
        labels,
        datasets: [
          { label: 'Duration + Convexity (true)', data: withConv, borderColor: '#2a7a4f', backgroundColor: 'rgba(42,122,79,0.06)', tension: 0.4, pointRadius: 1 },
          { label: 'Duration only (linear)', data: durOnly, borderColor: '#c8401a', borderDash: [5, 5], tension: 0.1, pointRadius: 0, borderWidth: 1.5 },
        ],
        xLabel: 'Yield Change (bps)', yLabel: 'Estimated Bond Price ($)',
        caption: 'The green curve (with convexity) always sits above the red line — higher price for any given yield move'
      };
    },
    traps: [
      { label: 'Negative convexity — callable bonds and MBS', text: 'Callable bonds and mortgage-backed securities have <strong>negative convexity</strong> near the call price. When yields fall, the issuer calls the bond back, capping your price upside. The convexity adjustment becomes negative — the bond underperforms a straight-line prediction when yields fall sharply.' },
      { label: 'Convexity is always positive for option-free bonds', text: 'For a plain vanilla bond with no embedded options, convexity is <strong>always positive</strong> — meaning the adjustment always helps the investor, regardless of the direction of yield change. This is stated as a fact on the exam.' },
    ],
    reality: `Portfolio managers deliberately seek high-convexity bonds when they expect large yield moves in either direction. The trade-off: high-convexity bonds are more expensive (lower yield) because the market prices in the benefit of the favourable asymmetry.`
  },

  // ══════════════════════════════════════════════════════════
  // 14. TREYNOR + JENSEN'S ALPHA
  // ══════════════════════════════════════════════════════════
  {
    id: 'treynor-alpha',
    subject: 'Portfolio Management',
    name: 'Treynor Ratio & Jensen\'s Alpha',
    tagline: 'Measuring performance when the portfolio is part of something bigger',
    bigIdea: `Sharpe ratio uses total risk (σ). But if a portfolio is just one piece of a larger diversified fund, <strong>unsystematic risk doesn't matter</strong> — it's already been diversified away at the fund level. In that context, you should only measure performance relative to the <em>systematic</em> risk taken, which is exactly what Treynor and Jensen's Alpha do.`,
    formula: `Treynor = (<span class="hi">Rp</span> − <span class="hi2">Rf</span>) / <span class="hi3">βp</span><br><small style="font-size:0.85rem">α = <span class="hi">Rp</span> − [<span class="hi2">Rf</span> + β(<span class="hi3">Rm</span>−<span class="hi2">Rf</span>)]</small>`,
    vars: [
      { sym: 'Treynor', def: 'Excess return per unit of systematic risk (beta) — higher is better' },
      { sym: 'α (Alpha)', def: 'Actual return minus CAPM-predicted return — positive alpha = manager added value' },
      { sym: 'βp', def: 'Portfolio beta — measures only the systematic market risk the portfolio took' },
    ],
    intuition: `Think of three workers hired to take on market risk. Treynor asks: how much did each worker earn per unit of systematic risk they absorbed? Jensen's alpha asks: did the worker earn more than CAPM said they should, given the risk they took? A positive alpha means the manager genuinely added value — they weren't just rewarded for taking on more beta. A negative alpha means they destroyed value on a risk-adjusted basis.`,
    pullQuote: `"If Sharpe, Treynor, and Jensen give different rankings, it's because the portfolios differ in their degree of diversification. For well-diversified funds, Treynor and Jensen are the right tools."`,
    connected: ['sharpe', 'capm', 'port-var'],
    inputs: [
      { id: 'tj_rp', label: 'Portfolio Return', sym: 'Rp', type: 'range', min: -5, max: 30, step: 0.5, val: 14, unit: '%' },
      { id: 'tj_rf', label: 'Risk-Free Rate', sym: 'Rf', type: 'range', min: 0, max: 10, step: 0.25, val: 3, unit: '%' },
      { id: 'tj_rm', label: 'Market Return', sym: 'Rm', type: 'range', min: 2, max: 20, step: 0.5, val: 10, unit: '%' },
      { id: 'tj_beta', label: 'Portfolio Beta', sym: 'β', type: 'range', min: 0.1, max: 2.5, step: 0.1, val: 1.2, unit: '' },
      { id: 'tj_sigma', label: 'Portfolio Std Dev', sym: 'σp', type: 'range', min: 1, max: 50, step: 0.5, val: 18, unit: '%' },
    ],
    calc(v) {
      const treynor = (v.tj_rp - v.tj_rf) / v.tj_beta;
      const capm_r = v.tj_rf + v.tj_beta * (v.tj_rm - v.tj_rf);
      const alpha = v.tj_rp - capm_r;
      const sharpe = (v.tj_rp - v.tj_rf) / v.tj_sigma;
      const breakdown = `Treynor = (${v.tj_rp}%−${v.tj_rf}%) / ${v.tj_beta} = <strong>${treynor.toFixed(3)}</strong> | α = ${v.tj_rp}%−${capm_r.toFixed(2)}% = <strong>${alpha.toFixed(2)}%</strong>`;
      let insight = '';
      if (alpha > 0 && treynor > (v.tj_rm - v.tj_rf)) {
        insight = `<em>Positive alpha of ${alpha.toFixed(2)}%</em> — the manager earned more than CAPM predicted for the systematic risk taken. Treynor of ${treynor.toFixed(3)} exceeds the market's Treynor of ${(v.tj_rm - v.tj_rf).toFixed(2)}, confirming strong risk-adjusted performance. Compare to Sharpe (${sharpe.toFixed(3)}) — if Treynor is stronger relative to benchmark, the portfolio has <strong>less diversifiable risk than average</strong>.`;
      } else if (alpha < 0) {
        insight = `<em>Negative alpha of ${alpha.toFixed(2)}%</em> — the manager underperformed their CAPM expectation. Despite taking ${v.tj_beta}× market risk, the actual return of ${v.tj_rp}% fell short of the CAPM-required ${capm_r.toFixed(2)}%. The portfolio <strong>destroyed risk-adjusted value</strong>.`;
      } else {
        insight = `Alpha of ${alpha.toFixed(2)}% and Treynor of ${treynor.toFixed(3)}. The portfolio is performing in line with what the market would expect for its level of systematic risk. True skill shows as <em>consistent positive alpha</em> over time — a single period is inconclusive.`;
      }
      return { value: `Treynor = ${treynor.toFixed(3)}`, label: `Jensen's α = ${alpha.toFixed(2)}%`, breakdown, insight };
    },
    chart(v) {
      const betas = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5];
      const sml = betas.map(b => (v.tj_rf + b * (v.tj_rm - v.tj_rf)).toFixed(2));
      const portPoint = betas.map(b => b === Math.round(v.tj_beta * 4) / 4 ? v.tj_rp : null);
      return {
        labels: betas.map(b => 'β=' + b),
        datasets: [
          { label: 'Security Market Line', data: sml, borderColor: '#2d6a9f', backgroundColor: 'rgba(45,106,159,0.06)', tension: 0.1, pointRadius: 3 },
        ],
        xLabel: 'Beta (β)', yLabel: 'Return (%)',
        caption: 'Assets above the SML have positive alpha (undervalued); below have negative alpha (overvalued)'
      };
    },
    traps: [
      { label: 'Which metric to use — the key rule', text: '<strong>Standalone portfolio → use Sharpe</strong> (total risk matters). <strong>Portfolio that is one component of a larger fund → use Treynor or Jensen\'s Alpha</strong> (only systematic risk matters). The exam will specify the context — read it carefully.' },
      { label: 'Same beta does not mean same ranking', text: 'If two portfolios have the same beta, Treynor and Jensen\'s Alpha will give the <strong>same ranking</strong>. If they have different betas, Treynor (a ratio) and Alpha (an absolute number) can give different rankings — and both can differ from Sharpe.' },
    ],
    reality: `Jensen's Alpha is the most commonly cited measure of active manager skill in academic finance. Decades of research have found that most active fund managers have negative alpha after fees — meaning passive index funds systematically outperform on a risk-adjusted basis.`
  },

  // ══════════════════════════════════════════════════════════
  // 15. LIFO TO FIFO
  // ══════════════════════════════════════════════════════════
  {
    id: 'lifo-fifo',
    subject: 'Financial Statement Analysis',
    name: 'LIFO to FIFO Adjustment',
    tagline: 'Making two companies comparable when they use different inventory methods',
    bigIdea: `LIFO and FIFO are two different ways of accounting for the same physical inventory. In rising price environments, they produce <strong>dramatically different financial statements</strong> — different costs of goods sold, different profits, different taxes, different balance sheet values. Before you compare any two companies, you must ensure they're on the same accounting basis. The LIFO reserve is the bridge.`,
    formula: `FIFO NI = LIFO NI + <span class="hi">ΔLIFO Reserve</span> × (1 − <span class="hi2">t</span>)`,
    vars: [
      { sym: 'LIFO Reserve', def: 'The cumulative difference between FIFO and LIFO inventory on the balance sheet (disclosed in footnotes)' },
      { sym: 'ΔLIFO Reserve', def: 'Change in LIFO reserve during the period = LIFO Reserve (end) − LIFO Reserve (begin)' },
      { sym: '(1−t)', def: 'Tax adjustment — FIFO profits are higher, so taxes would have been higher too; net of tax gives comparable NI' },
    ],
    intuition: `In a world of rising prices, LIFO says "I sold my most recently purchased (expensive) inventory first." This gives you high COGS, low gross profit, and lower taxes. FIFO says "I sold my oldest (cheap) inventory first." This gives you low COGS, high gross profit, and higher taxes. The LIFO reserve is exactly the cumulative inventory understatement on the balance sheet — adding it back to inventory and adjusting for taxes converts everything to FIFO as if the company had always used FIFO.`,
    pullQuote: `"The LIFO reserve is one of the most information-rich numbers in a US company's footnotes. It tells you exactly how much reported profits have been understated relative to FIFO."`,
    connected: ['dupont', 'eps'],
    inputs: [
      { id: 'lf_lifo_ni', label: 'LIFO Net Income ($)', sym: 'LIFO NI', type: 'number', min: 0, max: 1000000, step: 5000, val: 200000, unit: '$' },
      { id: 'lf_res_beg', label: 'LIFO Reserve (Beginning)', sym: 'Res₀', type: 'number', min: 0, max: 500000, step: 1000, val: 40000, unit: '$' },
      { id: 'lf_res_end', label: 'LIFO Reserve (Ending)', sym: 'Res₁', type: 'number', min: 0, max: 500000, step: 1000, val: 55000, unit: '$' },
      { id: 'lf_t', label: 'Tax Rate', sym: 't', type: 'range', min: 0, max: 50, step: 1, val: 25, unit: '%' },
    ],
    calc(v) {
      const delta_res = v.lf_res_end - v.lf_res_beg;
      const fifo_ni = v.lf_lifo_ni + delta_res * (1 - v.lf_t / 100);
      const fifo_inv = v.lf_res_end; // FIFO inventory = LIFO inventory + ending reserve
      const diff = fifo_ni - v.lf_lifo_ni;
      const breakdown = `ΔLIFO Reserve = $${v.lf_res_end.toLocaleString()} − $${v.lf_res_beg.toLocaleString()} = <strong>$${delta_res.toLocaleString()}</strong> | FIFO NI = $${v.lf_lifo_ni.toLocaleString()} + $${delta_res.toLocaleString()} × (1−${v.lf_t}%) = <strong>$${fifo_ni.toLocaleString()}</strong>`;
      let insight = '';
      if (delta_res > 0) {

    formula: `F₀ = <span class="hi">S₀</span> × (1+<span class="hi2">r</span>)^<span class="hi3">T</span>`,

    ],
    intuition: `Here's why the formula must hold: if you want the asset at time T, you have two choices. Option 1: Buy it today for S₀ and hold it — but this ties up capital earning the risk-free rate. Option 2: Enter a forward contract and invest S₀ in T-bills instead. For no-arbitrage, these must cost the same. So the fair forward price equals the spot price <strong>compounded at the risk-free rate</strong> for the holding period — this is the cost of carry.`,
    pullQuote: `"If the actual forward price is higher than F₀, sell the forward and buy the spot (cash-and-carry). If lower, buy the forward and short the spot (reverse cash-and-carry). Both produce risk-free profit."`,

    inputs: [
      { id: 'fp_s', label: 'Spot Price S₀ ($)', sym: 'S₀', type: 'range', min: 10, max: 500, step: 5, val: 100, unit: '$' },

      const base = (v.fp_s - v.fp_benefit + v.fp_cost);

        labels: ts.map(t => t + ' yr'),
        datasets: [
          { label: 'Forward Price', data: ts.map(t => (base * Math.pow(1 + v.fp_r / 100, t)).toFixed(2)), borderColor: '#b8860b', backgroundColor: 'rgba(184,134,11,0.06)', tension: 0.3, pointRadius: 4 },
          { label: 'Spot Price', data: ts.map(() => v.fp_s), borderColor: '#aaaaaa', borderDash: [5, 5], pointRadius: 0, borderWidth: 1.5 },
        ],
        xLabel: 'Time to Delivery (years)', yLabel: 'Price ($)',
        caption: 'Forward price rises above spot as time to delivery increases — reflecting the growing cost of carry'
      };
    },
    traps: [
      { label: 'Benefits reduce the forward price; costs increase it', text: 'If the underlying pays dividends or coupons (benefits to the holder), the forward buyer misses out — so the forward price is <strong>reduced</strong> by PV(benefits). Storage or insurance costs are borne by the holder, so the forward buyer must pay for them — forward price is <strong>increased</strong> by PV(costs).' },
      { label: 'Value of a forward contract after initiation', text: 'At initiation, a forward contract has zero value. After time passes, its value changes: <strong>Long forward value = S_t − F₀/(1+r)^(T−t)</strong>. The current spot minus the PV of the original forward price. This is distinct from the forward price itself.' },
    ],
    reality: `Forward contracts are used everywhere in global finance — currency forwards for hedging FX risk, commodity forwards for farmers and airlines, equity forwards for institutions. Every futures contract traded on an exchange is a standardised, exchange-traded version of a forward agreement.`
  },

      { sym: 'P(A|B)', def: 'Posterior probability — your updated belief about A after observing B' },
    ],
    intuition: `Imagine a medical test for a rare disease. The disease affects 1% of people. The test is 95% accurate. You test positive. What is the probability you actually have the disease? Most people instinctively say "95%." The correct answer, via Bayes, is only about 16%. Why? Because the test generates many false positives on the vast 99% of healthy people, drowning out the true positives. <strong>Without updating for the prior probability of the disease, you dramatically overstate the risk.</strong> This counterintuitive result is why Bayes matters.`,
    pullQuote: `"Bayes' theorem is the mathematical embodiment of open-mindedness — it tells you exactly how to change your mind in proportion to the strength of new evidence."`,
    connected: ['tvm'],
    inputs: [
      { id: 'bay_pa', label: 'Prior P(A) — base rate', sym: 'P(A)', type: 'range', min: 1, max: 99, step: 1, val: 30, unit: '%' },
      { id: 'bay_pba', label: 'P(B|A) — signal if A is true', sym: 'P(B|A)', type: 'range', min: 1, max: 99, step: 1, val: 80, unit: '%' },
      { id: 'bay_pbna', label: 'P(B|Aᶜ) — false positive rate', sym: 'P(B|Aᶜ)', type: 'range', min: 1, max: 99, step: 1, val: 20, unit: '%' },
    ],
    calc(v) {
      const pa = v.bay_pa / 100;
      const pba = v.bay_pba / 100;
      const pbna = v.bay_pbna / 100;
      const pna = 1 - pa;
      const pb = pba * pa + pbna * pna;
      const paob = pba * pa / pb;
      const update = ((paob - pa) * 100).toFixed(1);
      const breakdown = `P(B) = ${v.bay_pba}%×${v.bay_pa}% + ${v.bay_pbna}%×${100 - v.bay_pa}% = <strong>${(pb * 100).toFixed(2)}%</strong> | P(A|B) = <strong>${(paob * 100).toFixed(2)}%</strong>`;
      const direction = paob > pa ? 'increased' : 'decreased';
      const strength = Math.abs(paob - pa) / pa;
      let insight = '';
      if (strength < 0.1) {
        insight = `The evidence B is <em>almost equally likely</em> whether or not A is true — so it barely updates your belief. Prior: ${v.bay_pa}% → Posterior: <strong>${(paob * 100).toFixed(1)}%</strong>. Weak signals that are nearly as likely under A or not-A provide almost no information.`;
      } else if (paob > pa) {
        insight = `Observing B <em>increases</em> the probability of A from ${v.bay_pa}% to <strong>${(paob * 100).toFixed(1)}%</strong> — an update of +${update} percentage points. The signal is informative because B is ${(pba / pbna).toFixed(1)}× more likely when A is true than when it isn't. The stronger this ratio, the more Bayesian updating occurs.`;
      } else {
        insight = `Observing B actually <em>decreases</em> the probability of A from ${v.bay_pa}% to <strong>${(paob * 100).toFixed(1)}%</strong>. This seems paradoxical — B occurred, but A became less likely? Yes: when B is more likely when A is <em>false</em>, observing B is evidence against A. This is the power of rigorous Bayesian reasoning.`;

      return { value: `P(A|B) = ${(paob * 100).toFixed(2)}%`, label: `Prior was ${v.bay_pa}%`, breakdown, insight };

      const posteriors = priors.map(p => {
        const pa = p / 100, pna = 1 - pa;
        const pb = pba * pa + pbna * pna;

      return {
        labels: priors.map(p => p + '%'),

          { label: 'Posterior P(A|B)', data: posteriors, borderColor: '#2d6a9f', backgroundColor: 'rgba(45,106,159,0.08)', tension: 0.4, pointRadius: 3 },
          { label: 'Prior = Posterior (no update)', data: priors.map(p => p.toFixed(1)), borderColor: '#aaaaaa', borderDash: [5, 5], pointRadius: 0, borderWidth: 1.5 },

      { label: 'The base rate matters enormously', text: 'Even a very accurate signal provides weak evidence when the prior probability (base rate) is very low. If the base rate is 1%, even a 95% accurate test gives a posterior of only ~16%. <strong>Always consider the base rate</strong> before interpreting conditional probabilities.' },
    ],
    reality: `Bayes' theorem is used everywhere in modern finance: spam filters, credit scoring models, fraud detection, and quantitative trading strategies all rely on Bayesian updating. In medicine, doctors are taught to think in prior probabilities and likelihoods to avoid diagnostic errors like the one in the intuition example above.`
  },

];

// =====================================================================
// SUBJECTS FOR NAV
// =====================================================================
const SUBJECTS = ['All', 'Portfolio Management', 'Fixed Income', 'Equity Valuation', 'Corporate Finance', 'Derivatives', 'Quantitative Methods', 'Financial Statement Analysis'];

let activeId = null;
let activeSubject = 'All';
let visited = new Set();
let activeCharts = {};

// =====================================================================
// BUILD NAV PILLS
// =====================================================================
const navEl = document.getElementById('navPills');
SUBJECTS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'nav-pill' + (s === 'All' ? ' active' : '');
  btn.textContent = s === 'All' ? 'All Topics' : s;
  btn.addEventListener('click', () => {
    activeSubject = s;
    document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderSidebar();
  });
  navEl.appendChild(btn);
});

// =====================================================================
// BUILD SIDEBAR
// =====================================================================
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const filtered = CONCEPTS.filter(c => activeSubject === 'All' || c.subject === activeSubject);

  // Group by subject
  const groups = {};
  filtered.forEach(c => {
    if (!groups[c.subject]) groups[c.subject] = [];
    groups[c.subject].push(c);
  });

  let html = '';
  Object.entries(groups).forEach(([subj, items]) => {
    html += `<div class="sidebar-section">
      <div class="sidebar-section-title">${subj}</div>`;
    items.forEach(c => {
      html += `<div class="formula-card ${activeId === c.id ? 'active' : ''} ${visited.has(c.id) ? 'visited' : ''}" data-id="${c.id}">
        <div class="fc-name">${c.name}</div>
        <div class="fc-tagline">${c.tagline}</div>
        <div class="fc-dot"></div>
      </div>`;
    });
    html += `</div>`;
  });

  // Keep progress strip
  const progress = `<div class="progress-strip">
    <span id="progressLabel">${visited.size} / ${CONCEPTS.length} visited</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:${(visited.size / CONCEPTS.length * 100).toFixed(0)}%"></div></div>
  </div>`;

  sidebar.innerHTML = html + progress;
  sidebar.querySelectorAll('.formula-card').forEach(el => {
    el.addEventListener('click', () => loadConcept(el.dataset.id));
  });
}

// =====================================================================
// LOAD CONCEPT
// =====================================================================
function loadConcept(id) {
  activeId = id;
  visited.add(id);
  renderSidebar();

  const c = CONCEPTS.find(x => x.id === id);
  if (!c) return;

  document.getElementById('emptyState').style.display = 'none';

  // Remove old panel
  const oldPanel = document.getElementById('active-panel');
  if (oldPanel) oldPanel.remove();
  if (activeCharts['main']) { activeCharts['main'].destroy(); activeCharts['main'] = null; }

  const panel = document.createElement('div');
  panel.id = 'active-panel';
  panel.className = 'concept-panel active';

  // Build vars html
  const varsHtml = c.vars.map(v =>
    `<div class="fr-var-pill"><span>${v.sym}</span>${v.def}</div>`
  ).join('');

  // Build inputs html
  const inputsHtml = c.inputs.map(inp => {
    if (inp.type === 'range') {
      return `<div class="slider-group">
        <div class="sg-label">${inp.label} <span class="sg-sym">${inp.sym}</span></div>
        <input type="range" id="${inp.id}" min="${inp.min}" max="${inp.max}" step="${inp.step}" value="${inp.val}">
        <div class="sg-val" id="${inp.id}_val">${inp.val}${inp.unit}</div>
      </div>`;
    } else {
      return `<div class="slider-group">
        <div class="sg-label">${inp.label} <span class="sg-sym">${inp.sym}</span></div>
        <input type="number" id="${inp.id}" min="${inp.min}" max="${inp.max}" step="${inp.step}" value="${inp.val}">
      </div>`;
    }
  }).join('');

  // Build connected pills
  const connectedHtml = c.connected ? c.connected.map(cid => {
    const linked = CONCEPTS.find(x => x.id === cid);
    return linked ? `<div class="connected-pill" data-id="${cid}">${linked.name}</div>` : '';
  }).join('') : '';

  // Build traps html
  const trapsHtml = (c.traps || []).map(t =>
    `<div class="trap-box"><div class="trap-header">⚠ Common Exam Trap: ${t.label}</div><p>${t.text}</p></div>`
  ).join('');

  panel.innerHTML = `
    <div class="cp-hero">
      <div class="subject-tag">${c.subject}</div>
      <h2>${c.name}</h2>
      <div class="big-idea">${c.bigIdea}</div>
    </div>

    <div class="formula-reveal">
      <div class="fr-label">The Formula — and what it means</div>
      <div class="fr-equation">${c.formula}</div>
      <div class="fr-vars">${varsHtml}</div>
    </div>

    <div class="cp-body">

      <div class="concept-block">
        <h3><span class="section-icon">💡</span> The Intuition</h3>
        <p>${c.intuition}</p>
        <div class="pull-quote">${c.pullQuote}</div>
      </div>

      <div class="lab-section">
        <div class="lab-title">Interactive Lab</div>
        <div class="lab-subtitle">Adjust inputs — watch what changes and why</div>
        <div class="sliders-grid">${inputsHtml}</div>
        <div class="result-card">
          <div>
            <div class="rc-label" id="rc-label">Result</div>
            <div class="rc-value" id="rc-value">—</div>
          </div>
          <div class="rc-breakdown" id="rc-breakdown">Adjust inputs above to see calculation breakdown</div>
        </div>
        <div class="live-insight">
          <span class="li-prefix">What this means in plain English</span>
          <span id="live-insight-text">Adjust the sliders above to see a real-world interpretation update here.</span>
        </div>
      </div>

      ${c.chart ? `<div class="lab-section">
        <div class="lab-title">Visual Understanding</div>
        <div class="lab-subtitle">How the relationship behaves across a range</div>
        <div class="chart-wrap">
          <canvas id="formulaChart" height="220"></canvas>
          <div class="chart-caption" id="chartCaption"></div>
        </div>
      </div>` : ''}

      <div class="concept-block">
        <h3><span class="section-icon">⚠</span> Exam Traps & Common Mistakes</h3>
        ${trapsHtml}
      </div>

      <div class="concept-block">
        <h3><span class="section-icon">🌍</span> Real-World Context</h3>
        <div class="reality-box"><strong>Why this matters beyond the exam: </strong>${c.reality}</div>
      </div>

      ${connectedHtml ? `<div class="concept-block">
        <h3><span class="section-icon">🔗</span> Connected Concepts</h3>
        <p>These formulas work together with ${c.name}. Understanding the connections deepens your intuition.</p>
        <div class="connected">${connectedHtml}</div>
      </div>` : ''}

    </div>
  `;

  document.getElementById('main').appendChild(panel);
  document.getElementById('main').scrollTop = 0;

  // Wire up inputs
  c.inputs.forEach(inp => {
    const el = document.getElementById(inp.id);
    if (!el) return;
    el.addEventListener('input', () => {
      if (inp.type === 'range') {
        document.getElementById(inp.id + '_val').textContent = el.value + inp.unit;
      }
      updateCalc(c);
    });
    el.addEventListener('change', () => updateCalc(c));
  });

  // Wire connected pills
  panel.querySelectorAll('.connected-pill').forEach(pill => {
    pill.addEventListener('click', () => loadConcept(pill.dataset.id));
  });

  updateCalc(c);
}

function getVals(c) {
  const v = {};
  c.inputs.forEach(inp => {
    const el = document.getElementById(inp.id);
    v[inp.id] = el ? (parseFloat(el.value) || 0) : inp.val;
  });
  return v;
}

function updateCalc(c) {
  try {
    const v = getVals(c);
    const result = c.calc(v);
    document.getElementById('rc-value').textContent = result.value;
    document.getElementById('rc-label').textContent = result.label;
    document.getElementById('rc-breakdown').innerHTML = result.breakdown;
    document.getElementById('live-insight-text').innerHTML = result.insight;
    if (c.chart) renderChart(c, v);
  } catch (e) {
    console.error(e);
  }
}

function renderChart(c, v) {
  const ctx = document.getElementById('formulaChart');
  if (!ctx) return;
  if (activeCharts['main']) { activeCharts['main'].destroy(); activeCharts['main'] = null; }
  const data = c.chart(v);
  document.getElementById('chartCaption').textContent = data.caption || '';
  activeCharts['main'] = new Chart(ctx, {
    type: data.type || 'line',
    data: { labels: data.labels, datasets: data.datasets },
    options: {
      responsive: true,
      animation: { duration: 300 },
      plugins: {
        legend: { labels: { color: '#7a7890', font: { family: 'Outfit', size: 11 }, boxWidth: 20 } }
      },
      scales: {
        x: {
          ticks: { color: '#7a7890', font: { size: 10 }, maxTicksLimit: 10 },
          grid: { color: 'rgba(0,0,0,0.06)' },
          title: { display: true, text: data.xLabel, color: '#7a7890', font: { size: 11 } }
        },
        y: {
          ticks: { color: '#7a7890', font: { size: 10 } },
          grid: { color: 'rgba(0,0,0,0.06)' },
          title: { display: true, text: data.yLabel, color: '#7a7890', font: { size: 11 } }
        }
      }
    }
  });
}

// Init
renderSidebar();
</script>
</body>
</html>
